<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-success text-white">

            <h3>Add Employee</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/save}" th:object="${employee}" method="post">

                <div class="mb-3">

                    <label>Name</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{name}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Department</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{department}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Salary</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{salary}"
                           required>

                </div>

                <button class="btn btn-success">
                    Save Employee
                </button>

                <a href="/" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
